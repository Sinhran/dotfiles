# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ


# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Window Rules (Hyprland 0.53+ Anonymous Syntax)
windowrule = match:class ^(firefox)$, opacity 0.90 0.90
windowrule = match:class ^(Brave-browser)$, opacity 0.90 0.90
windowrule = match:class ^(Steam|steam|steamwebhelper)$, opacity 0.80 0.80
windowrule = match:class ^(Spotify)$, opacity 0.80 0.80
windowrule = match:class ^(Code|code-url-handler)$, opacity 0.80 0.80
windowrule = match:class ^(kitty)$, opacity 0.80 0.80
windowrule = match:class ^(org.kde.dolphin|org.kde.ark)$, opacity 0.80 0.80
windowrule = match:class ^(nwg-look|qt5ct|qt6ct|kvantummanager)$, opacity 0.80 0.80
windowrule = match:class ^(com.github.rafostar.Clapper)$, opacity 0.90 0.90
windowrule = match:class ^(com.github.tchx84.Flatseal|hu.kramo.Cartridges|com.obsproject.Studio|gnome-boxes)$, opacity 0.80 0.80
windowrule = match:class ^(discord|WebCord|ArmCord)$, opacity 0.80 0.80
windowrule = match:class ^(app.drey.Warp|net.davidotek.pupgui2|yad|Signal)$, opacity 0.80 0.80
windowrule = match:class ^(io.github.alainm23.planify|io.gitlab.theevilskeleton.Upscaler|com.github.unrud.VideoDownloader)$, opacity 0.80 0.80
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.gtk|org.freedesktop.impl.portal.desktop.hyprland)$, opacity 0.80 0.80

# Special Opacity for System Tools
windowrule = match:class ^(pavucontrol|blueman-manager|nm-applet|nm-connection-editor)$, opacity 0.80 0.70
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, opacity 0.80 0.70

# Floating Rules (Boolean flags now require a value)
windowrule = match:class ^(org.kde.dolphin)$, match:title ^(Copying .* Dolphin)$, float 1
windowrule = match:title ^(Picture-in-Picture)$, float 1
windowrule = match:class ^(firefox)$, match:title ^(Library)$, float 1
windowrule = match:class ^(vlc|kvantummanager|qt5ct|qt6ct|nwg-look|org.kde.ark)$, float 1
windowrule = match:class ^(Signal|com.github.rafostar.Clapper|app.drey.Warp|net.davidotek.pupgui2|yad)$, float 1
windowrule = match:class ^(eog|io.github.alainm23.planify|io.gitlab.theevilskeleton.Upscaler|com.github.unrud.VideoDownloader)$, float 1
windowrule = match:class ^(pavucontrol|blueman-manager|nm-applet|nm-connection-editor|org.kde.polkit-kde-authentication-agent-1)$, float 1

# Layer Rules (Hyprland 0.53+ Block Syntax)
layerrule {
    name = system_overlay_blur
    match:namespace = ^(rofi|notifications|swaync-notification-window|swaync-control-center|logout_dialog)$
    blur = on
    ignore_alpha = on
}
