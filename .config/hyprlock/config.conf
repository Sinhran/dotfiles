# hyprlock Configuration - NERV/Amber Theme
# GPU-accelerated screen lock for Hyprland

$text_color = 0xFFFFB000
$background_color = 0xFF0D0D0D
$nerv_red = 0xFFFF4B4B

general {
    disable_loading_bar = false
    no_fade_in = false
    grace = 5
    ignore_empty_password = false
    show_failed_attempts = false
}

input-field {
    monitoring = true
    size = 250, 50
    outline_thickness = 2
    outline_color = $nerv_red
    inner_color = 0x00000000
    placeholder_text = "Password..."
    placeholder_color = 0xFF666666
    font_family = "JetBrainsMono Nerd Font"
    font_size = 14
    text_color = $text_color
    fade_on_empty = true
    position = 0, -100
    halign = center
    valign = center
}

label {
    text = "LOCKED"
    color = $text_color
    font_family = "JetBrainsMono Nerd Font"
    font_size = 24
    position = 0, -180
    halign = center
    valign = center
}

label {
    text = cmd[date,0,%H:%M:%S]
    color = $nerv_red
    font_family = "JetBrainsMono Nerd Font"
    font_size = 72
    position = 0, -300
    halign = center
    valign = center
}

label {
    text = cmd[date,0,%Y-%m-%d]
    color = $text_color
    font_family = "JetBrainsMono Nerd Font"
    font_size = 16
    position = 0, -360
    halign = center
    valign = center
}

background {
    fullscreen_overlay = true
    color = $background_color
}

# Decorative corner accents
label {
    text = "━━━━━━━━━━━━━━━━━━━━━━━━━━"
    color = $nerv_red
    font_size = 8
    position = 0, -480
    halign = center
    valign = center
}

label {
    text = "━━━━━━━━━━━━━━━━━━━━━━━━━━"
    color = $nerv_red
    font_size = 8
    position = 0, 380
    halign = center
    valign = center
}
